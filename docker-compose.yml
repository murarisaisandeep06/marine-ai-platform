version: "3.9"

services:
  
  postgres:
    image: postgres:15
    container_name: marine-postgres
    environment:
      POSTGRES_USER: marine
      POSTGRES_PASSWORD: marine123
      POSTGRES_DB: marine_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: marine-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ollama:
    image: ollama/ollama
    container_name: marine-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always
  
  chatbot-service:
    build: ./chatbot-service
    container_name: marine-chatbot
    ports:
      - "8001:8001"
    depends_on:
      - ollama
  
  api-gateway:
    build: ./api-gateway
    container_name: marine-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - chatbot-service
    restart: always
    volumes:
    - ./data:/data 

volumes:
  postgres-data:
  mongo-data:
  ollama-data: